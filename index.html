<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Trip Plan: Korea</title>
    <!-- Prevent caching so changes are always reflected -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js to parse Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Custom styles to make the markdown look beautiful */
        html, body {
            overflow-x: hidden;
            max-width: 100vw;
        }
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1e293b;
            font-size: 15px;
        }
        .prose h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 0.5rem; color: #0f172a; word-break: break-word; }
        .prose h2 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #334155; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.35rem; }
        .prose h3 { font-size: 1.3rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #475569; word-break: break-word; }
        .prose p, .prose li { line-height: 1.6; margin-bottom: 0.35rem; overflow-wrap: break-word; }
        .prose ul, .prose ol { padding-left: 1.25rem; margin-bottom: 0.35rem; }
        .prose li::marker { color: #64748b; }
        .prose strong { color: #0f172a; font-weight: 600; }
        .prose blockquote { border-left: 3px solid #cbd5e1; padding-left: 0.75rem; font-style: italic; color: #64748b; overflow-wrap: break-word; }
        .prose hr { margin: 1.5rem 0; border: 0; border-top: 1px solid #e2e8f0; }
        /* Mobile-friendly details */
        details {
            background: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.08);
            margin-bottom: 0.5rem;
            border: 1px solid #e2e8f0;
        }
        summary {
            font-weight: 700;
            cursor: pointer;
            color: #2563eb;
            outline: none;
            padding: 0.25rem 0;
        }
        summary:hover { color: #1d4ed8; }
        /* Make tables scrollable on mobile */
        .prose table {
            display: block;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            width: 100%;
        }
        /* Touch-friendly tap targets for collapsibles */
        summary::marker, summary::-webkit-details-marker {
            color: #2563eb;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0f172a;
                color: #e2e8f0;
            }
            .prose h1 { color: #f1f5f9; }
            .prose h2 { color: #cbd5e1; border-bottom-color: #334155; }
            .prose h3 { color: #94a3b8; }
            .prose strong { color: #f1f5f9; }
            .prose blockquote { border-left-color: #475569; color: #94a3b8; }
            .prose hr { border-top-color: #334155; }
            .prose table { background-color: #1e293b; color: #e2e8f0; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; width: 100%; }
            .prose code { background-color: #1e293b; color: #cbd5e1; word-break: break-word; overflow-wrap: break-word; }
            .prose a { color: #60a5fa; }
            details {
                background: #1e293b;
                border-color: #334155;
                box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.3);
                padding: 0.75rem;
                margin-bottom: 0.5rem;
            }
            summary { color: #60a5fa; padding: 0.25rem 0; }
            summary:hover { color: #93c5fd; }

            .prose li::marker { color: #94a3b8; }

            /* Override Tailwind utility classes in dark mode */
            header h1, .text-slate-900 { color: #f8fafc !important; }
            .text-slate-600 { color: #cbd5e1 !important; }
            .prose p { color: #cbd5e1; }

            /* Fix footer line and text in dark mode */
            .border-t.slate-200, .border-slate-200 { border-top-color: #334155 !important; }
            .text-slate-500 { color: #64748b !important; }
        }

        /* Mobile-first responsive fixes */
        @media (max-width: 640px) {
            header h1, .text-3xl, .sm\:text-4xl { font-size: 1.5rem !important; }
            .prose h2 { font-size: 1.25rem; margin-top: 0.8rem; }
            .prose h3 { font-size: 1.1rem; margin-top: 0.7rem; }
            body, article.prose { font-size: 13.5px; }
            .py-8, .sm\:px-6, .lg\:px-10 { padding-top: 0.5rem !important; padding-bottom: 0.5rem !important; padding-left: 0.25rem !important; padding-right: 0.25rem !important; }
            details {
                padding: 0.6rem !important;
                margin-bottom: 0.3rem !important;
            }
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto py-8 px-4 sm:px-6 lg:px-10">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">
                🇰🇷 Family Adventure: Korea
            </h1>
            <p class="mt-2 text-base text-slate-600">
                Everything you need to know for our trip from NY to Seoul.
            </p>
        </header>

        <!-- This is where the Markdown content will be injected -->
        <article id="markdown-content" class="prose prose-slate max-w-none"></article>

        <footer class="mt-8 pt-4 border-t border-slate-200 text-center text-sm text-slate-500">
            <p>Generated from trip_plan.md &bull; Updated for 2026</p>
        </footer>
    </div>

    <script>
        // Fetch the markdown file and render it
        async function renderMarkdown() {
            const contentDiv = document.getElementById('markdown-content');
            try {
                const response = await fetch('trip_plan.md');
                if (!response.ok) throw new Error('Could not find trip_plan.md');
                const markdownText = await response.text();

                // Use marked.parse to convert markdown to HTML
                contentDiv.innerHTML = marked.parse(markdownText);
            } catch (error) {
                console.error(error);
                contentDiv.innerHTML = '<p class="text-red-500">Error loading the trip plan. Please ensure trip_plan.md is in the same folder.</p>';
            }
        }

        renderMarkdown();
    </script>
</body>
</html>
