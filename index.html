<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Trip Plan: Korea</title>
    <!-- Prevent caching so changes are always reflected -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js to parse Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Custom styles to make the markdown look beautiful */
        html, body {
            overflow-x: hidden;
            max-width: 100vw;
        }
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1e293b;
            font-size: 15px;
        }
        .prose h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 0.5rem; color: #0f172a; word-break: break-word; }
        .prose h2 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #334155; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.35rem; }
        .prose h3 { font-size: 1.3rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #475569; word-break: break-word; }
        .prose p, .prose li { line-height: 1.6; margin-bottom: 0.35rem; overflow-wrap: break-word; }
        .prose ul, .prose ol { padding-left: 1.25rem; margin-bottom: 0.35rem; }
        .prose li::marker { color: #64748b; }
        .prose strong { color: #0f172a; font-weight: 600; }
        .prose blockquote { border-left: 3px solid #cbd5e1; padding-left: 0.75rem; font-style: italic; color: #64748b; overflow-wrap: break-word; }
        .trip-title { font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; color: #334155; }
        .prose hr { margin: 1.5rem 0; border: 0; border-top: 1px solid #e2e8f0; }
        /* Mobile-friendly details */
        details {
            background: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.08);
            margin-bottom: 0.5rem;
            border: 1px solid #e2e8f0;
        }
        summary {
            font-weight: 700;
            cursor: pointer;
            color: #2563eb;
            outline: none;
            padding: 0.25rem 0;
        }
        summary:hover { color: #1d4ed8; }
        /* Make tables scrollable on mobile */
        .prose table {
            display: block;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            width: 100%;
        }
        .prose table { border-collapse: collapse; border-spacing: 0; }
        .prose th, .prose td { padding: 0.5rem 0.75rem; text-align: left; vertical-align: top; }
        .prose th { background-color: #f8fafc; font-weight: 600; color: #334155; border-bottom: 2px solid #e2e8f0; }
        .prose td { border-top: 1px solid #e2e8f0; border-bottom: none; }
        /* Zebra striping for readability */
        .prose tbody tr:nth-child(even) td { background-color: #fafbfc; }
        .prose tbody tr:hover td { background-color: #f1f5f9; }
        /* Touch-friendly tap targets for collapsibles */
        summary::marker, summary::-webkit-details-marker {
            color: #2563eb;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0f172a;
                color: #e2e8f0;
            }
            .prose h1 { color: #f1f5f9; }
            .prose h2 { color: #cbd5e1; border-bottom-color: #334155; }
            .prose h3 { color: #94a3b8; }
            .prose strong { color: #f1f5f9; }
            .prose blockquote { border-left-color: #475569; color: #94a3b8; }
            .prose hr { border-top-color: #334155; }
            .trip-title { color: #cbd5e1; }
            .prose table { background-color: #1e293b; color: #e2e8f0; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; width: 100%; }
            .prose table { border-collapse: collapse; border-spacing: 0; }
            .prose th { background-color: #334155; font-weight: 600; color: #cbd5e1; border-bottom: 2px solid #475569; }
            .prose td { border-top: 1px solid #334155; border-bottom: none; }
            .prose tbody tr:nth-child(even) td { background-color: #243044; }
            .prose tbody tr:hover td { background-color: #2d3e56; }
            .prose code { background-color: #1e293b; color: #cbd5e1; word-break: break-word; overflow-wrap: break-word; }
            .prose a { color: #60a5fa; }
            details {
                background: #1e293b;
                border-color: #334155;
                box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.3);
                padding: 0.75rem;
                margin-bottom: 0.5rem;
            }
            summary { color: #60a5fa; padding: 0.25rem 0; }
            summary:hover { color: #93c5fd; }

            .prose li::marker { color: #94a3b8; }

            /* Override Tailwind utility classes in dark mode */
            header h1, .text-slate-900 { color: #f8fafc !important; }
            .text-slate-600 { color: #cbd5e1 !important; }
            .prose p { color: #cbd5e1; }

            /* Fix footer line and text in dark mode */
            .border-t.slate-200, .border-slate-200 { border-top-color: #334155 !important; }
            .text-slate-500 { color: #64748b !important; }
        }

        /* Mobile-first responsive fixes */
        @media (max-width: 640px) {
            header h1, .text-3xl, .sm\:text-4xl { font-size: 1.5rem !important; }
            .prose h2 { font-size: 1.25rem; margin-top: 0.8rem; }
            .prose h3 { font-size: 1.1rem; margin-top: 0.7rem; }
            body, article.prose { font-size: 13.5px; }
            .py-8, .sm\:px-6, .lg\:px-10 { padding-top: 0.5rem !important; padding-bottom: 0.5rem !important; padding-left: 0.25rem !important; padding-right: 0.25rem !important; }
            details {
                padding: 0.6rem !important;
                margin-bottom: 0.3rem !important;
            }
        }

        /* Dark mode calendar */
        @media (prefers-color-scheme: dark) {
            .dark-calendar { background:#1e293b !important; border-color:#334155 !important; box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.4) !important; }
            .dark-calendar summary { color:#60a5fa !important; }
            .dark-calendar pre { color:#e2e8f0 !important; }
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-4xl mx-auto py-8 px-4 sm:px-6 lg:px-10">
        <h1 class="trip-title">🇰🇷 Family Trip: Korea</h1>

        <!-- Trip Overview — always visible, not folding -->
        <div class="mb-4 dark-calendar" style="background:white;padding:0.75rem;border-radius:0.5rem;box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.08);border:1px solid #e2e8f0;">


            <!-- Animated timeline — segment lengths proportional to days spent -->
            <div style="margin-top:0.85rem;margin-bottom:0.85rem;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;">
                <svg viewBox="-34 0 678 52" style="width:100%;min-width:340px;height:auto;" xmlns="http://www.w3.org/2000/svg">
                    <!-- No background line. Only colored sections connected end-to-end (no gaps). -->
                    <!-- Proportions: 2d flight, 6d Seoul, 4d Busan, 3d Jeju, 3d Seoul-return = 18d total -->
                    <g>
                        <!-- Flight (2d / 18d = 67.8px) -->
                        <rect x="0" y="24" width="67.8" height="4" rx="2" fill="#6366f1">
                            <animate attributeName="width" from="0" to="67.8" dur="0.4s" begin="0s" fill="freeze"/>
                        </rect>
                        <!-- Seoul (6d / 18d = 203.3px) -->
                        <rect x="67.8" y="24" width="203.3" height="4" rx="2" fill="#3b82f6">
                            <animate attributeName="width" from="0" to="203.3" dur="0.4s" begin="0.25s" fill="freeze"/>
                        </rect>
                        <!-- Busan (4d / 18d = 135.6px) -->
                        <rect x="271.1" y="24" width="135.6" height="4" rx="2" fill="#10b981">
                            <animate attributeName="width" from="0" to="135.6" dur="0.4s" begin="0.5s" fill="freeze"/>
                        </rect>
                        <!-- Jeju (3d / 18d = 101.7px) -->
                        <rect x="406.7" y="24" width="101.7" height="4" rx="2" fill="#f59e0b">
                            <animate attributeName="width" from="0" to="101.7" dur="0.4s" begin="0.75s" fill="freeze"/>
                        </rect>
                        <!-- Seoul-return (3d / 18d = 101.7px) — departs Sep 8 -->
                        <rect x="508.4" y="24" width="101.7" height="4" rx="2" fill="#3b82f6">
                            <animate attributeName="width" from="0" to="101.7" dur="0.4s" begin="1.0s" fill="freeze"/>
                        </rect>
                    </g>

                    <!-- nodes — at each transition point -->
                    <!-- ✈️ Aug 20–21: departure -->
                    <circle cx="0" cy="26" r="5" fill="#6366f1"><animate attributeName="r" from="0" to="5" dur="0.3s" begin="0s" fill="freeze"/></circle>
                    <text x="0" y="40" text-anchor="middle" font-size="7" fill="#64748b" font-family="system-ui">✈️ Aug 20–21</text>

                    <!-- Seoul (start of blue) -->
                    <circle cx="67.8" cy="26" r="5" fill="#3b82f6"><animate attributeName="r" from="0" to="5" dur="0.3s" begin="0.25s" fill="freeze"/></circle>
                    <text x="67.8" y="19" text-anchor="middle" font-size="7" fill="#475569" font-family="system-ui">🏛️</text>
                    <text x="67.8" y="40" text-anchor="middle" font-size="7.5" fill="#3b82f6" font-weight="bold" font-family="system-ui">Seoul</text>

                    <!-- ✈️ Aug 29 above Busan dot -->
                    <circle cx="271.1" cy="26" r="5" fill="#10b981"><animate attributeName="r" from="0" to="5" dur="0.3s" begin="0.5s" fill="freeze"/></circle>
                    <text x="271.1" y="12" text-anchor="middle" font-size="7.5" fill="#64748b" font-family="system-ui">✈️ Aug 29</text>
                    <text x="338.9" y="19" text-anchor="middle" font-size="7" fill="#475569" font-family="system-ui">🌊</text>
                    <text x="338.9" y="40" text-anchor="middle" font-size="7.5" fill="#10b981" font-weight="bold" font-family="system-ui">Busan</text>

                    <!-- ✈️ Sep 2 above Jeju dot -->
                    <circle cx="406.7" cy="26" r="5" fill="#f59e0b"><animate attributeName="r" from="0" to="5" dur="0.3s" begin="0.75s" fill="freeze"/></circle>
                    <text x="406.7" y="12" text-anchor="middle" font-size="7.5" fill="#64748b" font-family="system-ui">✈️ Sep 2</text>
                    <text x="457.5" y="19" text-anchor="middle" font-size="7" fill="#475569" font-family="system-ui">🏝️</text>
                    <text x="457.5" y="40" text-anchor="middle" font-size="7.5" fill="#f59e0b" font-weight="bold" font-family="system-ui">Jeju</text>

                    <!-- ✈️ Sep 5 above Seoul-return dot -->
                    <circle cx="508.4" cy="26" r="5" fill="#3b82f6"><animate attributeName="r" from="0" to="5" dur="0.3s" begin="1.0s" fill="freeze"/></circle>
                    <text x="508.4" y="12" text-anchor="middle" font-size="7.5" fill="#64748b" font-family="system-ui">✈️ Sep 5</text>
                    <text x="559.2" y="19" text-anchor="middle" font-size="7" fill="#475569" font-family="system-ui">🏛️</text>
                    <text x="559.2" y="40" text-anchor="middle" font-size="7.5" fill="#3b82f6" font-weight="bold" font-family="system-ui">Seoul</text>

                    <!-- departure at end of Seoul-return segment -->
                    <circle cx="610.1" cy="26" r="5" fill="#ef4444"><animate attributeName="r" from="0" to="5" dur="0.3s" begin="1.25s" fill="freeze"/></circle>
                    <text x="610.1" y="19" text-anchor="middle" font-size="7" fill="#475569" font-family="system-ui">🛫</text>
                    <text x="610.1" y="40" text-anchor="middle" font-size="7.5" fill="#ef4444" font-weight="bold" font-family="system-ui">Sep 8</text>
                </svg>
            </div>

        </div>

        <style>
            /* Overview-box classes — for dark mode support */
            .ob-card { background:#f8fafc; border-color:#e2e8f0; }
            .ob-stat-lg { color:#3b82f6; }
            .ob-stat-sm { color:#64748b; }
            .ob-budget  { background:#f8fafc; border-color:#e2e8f0; }
            .ob-budget-header { color:#475569; }
            .ob-budget-val { color:#1e293b; }
            .ob-warn  { background:#fefce8; border-color:#fde047; }
            .ob-warn-title { color:#a16207; }
            .ob-warn-text { color:#713f12; }

            @media (prefers-color-scheme: dark) {
                /* SVG colors */
                .dark-calendar svg text[fill="#3b82f6"],
                .dark-calendar svg text[fill="#10b981"],
                .dark-calendar svg text[fill="#f59e0b"],
                .dark-calendar svg text[fill="#3b82f6"],
                .dark-calendar svg text[fill="#ef4444"] { fill: #93c5fd !important; }
                .dark-calendar svg line[stroke="#6366f1"] { stroke: #818cf8 !important; }
                .dark-calendar svg circle[fill="#3b82f6"] { fill: #60a5fa !important; }
                .dark-calendar svg circle[fill="#10b981"] { fill: #34d399 !important; }
                .dark-calendar svg circle[fill="#f59e0b"] { fill: #fbbf24 !important; }
                .dark-calendar svg circle[fill="#3b82f6"] { fill: #a78bfa !important; }
                .dark-calendar svg circle[fill="#ef4444"] { fill: #f87171 !important; }

                /* Overview-box class overrides in dark mode */
                .ob-card  { background:#334155 !important; border-color:#475569 !important; }
                .ob-stat-lg { color:#60a5fa !important; }
                .ob-stat-sm { color:#94a3b8 !important; }
                .ob-budget  { background:#1e293b !important; border-color:#334155 !important; }
                .ob-budget-header { color:#cbd5e1 !important; }
                .ob-budget-val { color:#fbbf24 !important; }
                .ob-warn  { background:#422006 !important; border-color:#854d0e !important; }
                .ob-warn-title { color:#fbbf24 !important; }
                .ob-warn-text { color:#d97706 !important; }
            }
        </style>

        <!-- This is where the Markdown content will be injected -->
        <article id="markdown-content" class="prose prose-slate max-w-none"></article>

        <footer class="mt-8 pt-4 border-t border-slate-200 text-center text-sm text-slate-500">
            <p>Generated from trip_plan.md &bull; Updated for 2026</p>
        </footer>
    </div>

    <script>
        // Fetch the markdown file and render it
        async function renderMarkdown() {
            const contentDiv = document.getElementById('markdown-content');
            try {
                const response = await fetch('trip_plan.md');
                if (!response.ok) throw new Error('Could not find trip_plan.md');
                const markdownText = await response.text();

                // Use marked.parse to convert markdown to HTML
                contentDiv.innerHTML = marked.parse(markdownText);
            } catch (error) {
                console.error(error);
                contentDiv.innerHTML = '<p class="text-red-500">Error loading the trip plan. Please ensure trip_plan.md is in the same folder.</p>';
            }
        }

        renderMarkdown();
    </script>
</body>
</html>
